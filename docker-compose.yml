services:
  ai-driver:
    build:
      context: ./ai-driver
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SBERGPT_API_KEY=${SBERGPT_API_KEY}
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
